app-id: org.jxplorer.JXplorer
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk21
command: jxplorer
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home
  - --env=PATH=/app/jre/bin:/app/bin:/usr/bin
  - --env=JAVA_HOME=/app/jre

modules:
  - name: openjdk
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/openjdk21/install.sh
    cleanup:
      - /jre/legal
      - /jre/man

  - name: jxplorer
    buildsystem: simple
    sources:
      - type: archive
        url: https://sourceforge.net/projects/jxplorer/files/jxplorer/version%203.3.1.2/jxplorer-3.3.1.2-project.zip/download
        sha256: b4d4fd1dbad2e93f981494ef4ce151bb56723fc5acf83a4fb19173d187db6b9b
        dest-filename: jxplorer-3.3.1.2-project.zip
        strip-components: 1
      
      - type: file
        path: org.jxplorer.JXplorer.desktop
      
      - type: file
        path: org.jxplorer.JXplorer.metainfo.xml
      
      - type: file
        path: jxplorer.sh
    
    build-commands:
      # Install the application jars
      - install -Dm644 jars/jxplorer.jar /app/lib/jxplorer/jxplorer.jar
      - install -Dm644 jars/help.jar /app/lib/jxplorer/help.jar
      - install -Dm644 jars/jhall.jar /app/lib/jxplorer/jhall.jar
      
      # Copy other required directories
      - cp -r htmldocs /app/lib/jxplorer/
      - cp -r images /app/lib/jxplorer/
      - cp -r language /app/lib/jxplorer/
      - cp -r security.default /app/lib/jxplorer/
      - cp -r templates /app/lib/jxplorer/
      
      # Install launcher script
      - install -Dm755 jxplorer.sh /app/bin/jxplorer
      
      # Install icons
      - install -Dm644 images/JX16.png /app/share/icons/hicolor/16x16/apps/org.jxplorer.JXplorer.png
      - install -Dm644 images/JX32.png /app/share/icons/hicolor/32x32/apps/org.jxplorer.JXplorer.png
      - install -Dm644 images/JX48.png /app/share/icons/hicolor/48x48/apps/org.jxplorer.JXplorer.png
      - install -Dm644 images/JX128.png /app/share/icons/hicolor/128x128/apps/org.jxplorer.JXplorer.png
      
      # Install desktop file and metainfo
      - install -Dm644 org.jxplorer.JXplorer.desktop /app/share/applications/org.jxplorer.JXplorer.desktop
      - install -Dm644 org.jxplorer.JXplorer.metainfo.xml /app/share/metainfo/org.jxplorer.JXplorer.metainfo.xml
